name: CI - Build and Test Node.js Express API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests with coverage
        run: npm test

      - name: Build verification
        run: npm run start & sleep 5 && curl http://localhost:3000/health && kill %1
